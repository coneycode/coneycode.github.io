<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>与 AI 沟通频次日历</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .page-header h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #58a6ff, #bc8cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .page-header p {
      color: #8b949e;
      font-size: 14px;
    }

    /* 总览卡片 */
    .stats-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .stat-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px 28px;
      text-align: center;
      min-width: 140px;
      animation: fadeUp 0.5s ease both;
    }

    .stat-card .number {
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-card .label {
      font-size: 12px;
      color: #8b949e;
    }

    .stat-card:nth-child(1) .number { color: #58a6ff; }
    .stat-card:nth-child(2) .number { color: #3fb950; }
    .stat-card:nth-child(3) .number { color: #f78166; }
    .stat-card:nth-child(4) .number { color: #bc8cff; }
    .stat-card:nth-child(5) .number { color: #ffa657; }

    /* 图例 */
    .legend {
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: flex-end;
      margin-bottom: 12px;
      font-size: 12px;
      color: #8b949e;
    }

    .legend-cell {
      width: 14px;
      height: 14px;
      border-radius: 3px;
    }

    /* 月份容器 */
    .months-wrapper {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .month-block {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 24px;
      min-width: 340px;
      animation: fadeUp 0.6s ease both;
    }

    .month-block:nth-child(2) { animation-delay: 0.1s; }

    .month-title {
      font-size: 18px;
      font-weight: 700;
      color: #e6edf3;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .month-title span {
      font-size: 12px;
      color: #8b949e;
      font-weight: 400;
    }

    /* 星期表头 */
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 6px;
    }

    .weekday {
      text-align: center;
      font-size: 11px;
      color: #8b949e;
      padding: 4px 0;
    }

    /* 日历格子 */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .day-cell {
      aspect-ratio: 1;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
      cursor: default;
      position: relative;
      transition: transform 0.15s ease, filter 0.15s ease;
      min-height: 40px;
      animation: fadeIn 0.4s ease both;
    }

    .day-cell:not(.empty):hover {
      transform: scale(1.15);
      z-index: 10;
      filter: brightness(1.2);
    }

    .day-cell.empty {
      background: transparent;
    }

    .day-num {
      font-size: 12px;
      line-height: 1;
    }

    .day-count {
      font-size: 10px;
      opacity: 0.85;
      margin-top: 2px;
    }

    /* 热力颜色等级 */
    .level-0 { background: #21262d; color: #6e7681; }
    .level-1 { background: #0e4429; color: #56d364; }
    .level-2 { background: #006d32; color: #7ee787; }
    .level-3 { background: #26a641; color: #aff5b4; }
    .level-4 { background: #39d353; color: #fff; font-weight: 700; }

    /* 今天高亮 */
    .today {
      outline: 2px solid #58a6ff;
      outline-offset: -2px;
    }

    /* Tooltip */
    .tooltip {
      visibility: hidden;
      opacity: 0;
      background: #1c2128;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      white-space: nowrap;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      pointer-events: none;
      transition: opacity 0.2s ease;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .tooltip-date {
      font-weight: 700;
      color: #e6edf3;
      margin-bottom: 6px;
    }

    .tooltip-row {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #8b949e;
      margin-top: 4px;
    }

    .tooltip-row .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tooltip-val {
      color: #e6edf3;
      font-weight: 600;
    }

    .day-cell:not(.empty):hover .tooltip {
      visibility: visible;
      opacity: 1;
    }

    /* 底部活跃带 */
    .activity-bar {
      margin-top: 48px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 24px;
      animation: fadeUp 0.7s ease both;
    }

    .activity-bar h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #e6edf3;
    }

    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 120px;
    }

    .bar-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      height: 100%;
      justify-content: flex-end;
    }

    .bar-fill {
      width: 100%;
      border-radius: 4px 4px 0 0;
      background: linear-gradient(180deg, #58a6ff, #1f6feb);
      transition: height 0.6s cubic-bezier(0.34,1.56,0.64,1);
      min-height: 4px;
    }

    .bar-label {
      font-size: 10px;
      color: #8b949e;
      text-align: center;
      white-space: nowrap;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .months-wrapper { flex-direction: column; align-items: center; }
      .month-block { min-width: unset; width: 100%; max-width: 380px; }
    }
  </style>
</head>
<body>

<div class="page-header">
  <h1>📊 与 AI 沟通频次日历</h1>
  <p>2026年2月 — 2026年3月 &nbsp;·&nbsp; 基于本地 Session 记录统计</p>
</div>

<!-- 总览卡片 -->
<div class="stats-row">
  <div class="stat-card" style="animation-delay:0s">
    <div class="number">22</div>
    <div class="label">活跃天数</div>
  </div>
  <div class="stat-card" style="animation-delay:0.1s">
    <div class="number">355</div>
    <div class="label">总会话数</div>
  </div>
  <div class="stat-card" style="animation-delay:0.2s">
    <div class="number">1,238</div>
    <div class="label">您发出的消息数</div>
  </div>
  <div class="stat-card" style="animation-delay:0.3s">
    <div class="number">173</div>
    <div class="label">单日最高消息（3月4日）</div>
  </div>
  <div class="stat-card" style="animation-delay:0.4s">
    <div class="number">9,610</div>
    <div class="label">与AI聊天总条数</div>
  </div>
</div>

<!-- 图例 -->
<div style="max-width:780px;margin:0 auto 8px">
  <div class="legend">
    <span>少</span>
    <div class="legend-cell" style="background:#21262d"></div>
    <div class="legend-cell" style="background:#0e4429"></div>
    <div class="legend-cell" style="background:#006d32"></div>
    <div class="legend-cell" style="background:#26a641"></div>
    <div class="legend-cell" style="background:#39d353"></div>
    <span>多</span>
  </div>
</div>

<!-- 月份日历 -->
<div class="months-wrapper" id="calendars"></div>

<!-- 活跃度柱状图 -->
<div style="max-width:780px;margin:0 auto">
  <div class="activity-bar">
    <h3>📈 每日消息数趋势</h3>
    <div class="bar-chart" id="barChart"></div>
  </div>
</div>

<script>
  // ---- 数据 ----
  const DATA = {
    "2026-02-24": { sessions: 1,  messages: 4   },
    "2026-02-25": { sessions: 8,  messages: 39  },
    "2026-02-26": { sessions: 3,  messages: 11  },
    "2026-02-27": { sessions: 1,  messages: 6   },
    "2026-02-28": { sessions: 6,  messages: 31  },
    "2026-03-01": { sessions: 1,  messages: 4   },
    "2026-03-02": { sessions: 6,  messages: 53  },
    "2026-03-03": { sessions: 27, messages: 88  },
    "2026-03-04": { sessions: 32, messages: 173 },
    "2026-03-05": { sessions: 53, messages: 125 },
    "2026-03-06": { sessions: 19, messages: 62  },
    "2026-03-07": { sessions: 38, messages: 145 },
    "2026-03-08": { sessions: 42, messages: 87  },
    "2026-03-09": { sessions: 59, messages: 151 },
    "2026-03-10": { sessions: 3,  messages: 12  },
    "2026-03-11": { sessions: 4,  messages: 35  },
    "2026-03-12": { sessions: 16, messages: 50  },
    "2026-03-13": { sessions: 2,  messages: 18  },
    "2026-03-17": { sessions: 4,  messages: 17  },
    "2026-03-18": { sessions: 6,  messages: 30  },
    "2026-03-19": { sessions: 4,  messages: 23  },
    "2026-03-20": { sessions: 20, messages: 73  },
  };

  const WEEKDAYS = ["日", "一", "二", "三", "四", "五", "六"];
  const TODAY = "2026-03-20";
  const MAX_MESSAGES = 173;

  function getLevel(messages) {
    if (!messages) return 0;
    if (messages <= 10)  return 1;
    if (messages <= 40)  return 2;
    if (messages <= 100) return 3;
    return 4;
  }

  function formatDate(y, m, d) {
    return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function daysInMonth(y, m) {
    return new Date(y, m, 0).getDate();
  }

  function firstDayOfWeek(y, m) {
    return new Date(y, m - 1, 1).getDay(); // 0=Sunday
  }

  function renderMonth(year, month, monthName) {
    const total = daysInMonth(year, month);
    const startDay = firstDayOfWeek(year, month);

    const block = document.createElement('div');
    block.className = 'month-block';

    // 月份标题
    const title = document.createElement('div');
    title.className = 'month-title';
    const monthData = Object.entries(DATA).filter(([k]) => k.startsWith(`${year}-${String(month).padStart(2,'0')}`));
    const totalMessages = monthData.reduce((s, [,v]) => s + v.messages, 0);
    title.innerHTML = `${monthName} <span>本月共 ${totalMessages.toLocaleString()} 条消息</span>`;
    block.appendChild(title);

    // 星期表头
    const wd = document.createElement('div');
    wd.className = 'weekdays';
    WEEKDAYS.forEach(w => {
      const d = document.createElement('div');
      d.className = 'weekday';
      d.textContent = w;
      wd.appendChild(d);
    });
    block.appendChild(wd);

    // 格子
    const grid = document.createElement('div');
    grid.className = 'calendar-grid';

    // 前补空格
    for (let i = 0; i < startDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'day-cell empty';
      grid.appendChild(empty);
    }

    for (let d = 1; d <= total; d++) {
      const key = formatDate(year, month, d);
      const info = DATA[key];
      const level = getLevel(info?.messages);
      const cell = document.createElement('div');
      cell.className = `day-cell level-${level}${key === TODAY ? ' today' : ''}`;
      cell.style.animationDelay = `${(d + startDay) * 0.02}s`;

      const numEl = document.createElement('div');
      numEl.className = 'day-num';
      numEl.textContent = d;
      cell.appendChild(numEl);

      if (info) {
        const cntEl = document.createElement('div');
        cntEl.className = 'day-count';
        cntEl.textContent = info.messages.toLocaleString() + '条';
        cell.appendChild(cntEl);
      }

      // Tooltip
      const tip = document.createElement('div');
      tip.className = 'tooltip';
      const dateStr = `${year}年${month}月${d}日${key === TODAY ? '（今天）' : ''}`;
      if (info) {
        tip.innerHTML = `
          <div class="tooltip-date">${dateStr}</div>
          <div class="tooltip-row">
            <div class="dot" style="background:#58a6ff"></div>
            会话数：<span class="tooltip-val">${info.sessions} 次</span>
          </div>
          <div class="tooltip-row">
            <div class="dot" style="background:#3fb950"></div>
            消息数：<span class="tooltip-val">${info.messages.toLocaleString()} 条</span>
          </div>
        `;
      } else {
        tip.innerHTML = `<div class="tooltip-date">${dateStr}</div><div class="tooltip-row" style="color:#6e7681">无沟通记录</div>`;
      }
      cell.appendChild(tip);
      grid.appendChild(cell);
    }

    block.appendChild(grid);
    return block;
  }

  // 渲染两个月
  const container = document.getElementById('calendars');
  container.appendChild(renderMonth(2026, 2, '2026年 二月'));
  container.appendChild(renderMonth(2026, 3, '2026年 三月'));

  // 柱状图
  const sortedDays = Object.entries(DATA).sort(([a],[b]) => a.localeCompare(b));
  const barChart = document.getElementById('barChart');

  sortedDays.forEach(([date, info]) => {
    const pct = (info.messages / MAX_MESSAGES) * 100;
    const item = document.createElement('div');
    item.className = 'bar-item';

    const fill = document.createElement('div');
    fill.className = 'bar-fill';
    fill.style.height = '0%';

    const label = document.createElement('div');
    label.className = 'bar-label';
    // 只显示月日
    const parts = date.split('-');
    label.textContent = `${parseInt(parts[1])}/${parseInt(parts[2])}`;

    item.appendChild(fill);
    item.appendChild(label);
    barChart.appendChild(item);

    // 动画
    setTimeout(() => { fill.style.height = pct + '%'; }, 300);
  });
</script>

</body>
</html>
